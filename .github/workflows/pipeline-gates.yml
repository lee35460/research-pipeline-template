name: Pipeline Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke tests
        run: |
          chmod +x scripts/pipeline_gate_check.sh scripts/bootstrap_domain.sh tests/run_smoke_tests.sh
          bash tests/run_smoke_tests.sh
